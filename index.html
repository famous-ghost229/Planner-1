function currentLangMeta(){ return LANGS.find(l => l.code === (state.lang||"fa")) || LANGS[0]; }
function t(key){ const m = currentLangMeta(); return (TR[m.tr] && TR[m.tr][key]) || TR.fa[key] || key; }
function tpl(key, vars){
  let s = t(key);
  Object.keys(vars||{}).forEach(k => { s = s.split("{"+k+"}").join(vars[k]); });
  return s;
}
function getPresetTasks(){
  const trKey = currentLangMeta().tr;
  const names = PRESET_NAMES[trKey] || PRESET_NAMES.fa;
  return PRESET_DEFS.map(d => ({ name: names[d.key] || d.key, category: d.category, duration: d.duration, clockTime: d.clockTime }));
}
function getSideQuests(category){
  const trKey = currentLangMeta().tr;
  const byLang = SIDE_QUESTS_BY_LANG[trKey] || SIDE_QUESTS_BY_LANG.fa;
  return byLang[category] || byLang.DISC;
}
function weakestStatCategory(){
  const stats = (state.profile && state.profile.stats) || {STR:0,INT:0,VIT:0,DISC:0};
  const cats = ["STR","INT","VIT","DISC"];
  const minVal = Math.min(...cats.map(c=>stats[c]||0));
  const tied = cats.filter(c=>(stats[c]||0)===minVal);
  return tied[Math.floor(Math.random()*tied.length)];
}
function statLabel(cat){ const trKey = currentLangMeta().tr; return (STAT_LABELS_BY_LANG[trKey] || STAT_LABELS_BY_LANG.fa)[cat] || cat; }

function pad(n){ return String(n).padStart(2,"0"); }
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseKey(k){ const [y,m,d]=k.split("-").map(Number); return new Date(y,m-1,d); }
function addDays(d,n){ const nd=new Date(d); nd.setDate(nd.getDate()+n); return nd; }
function daysBetween(a,b){ const ms = new Date(b.getFullYear(),b.getMonth(),b.getDate()) - new Date(a.getFullYear(),a.getMonth(),a.getDate()); return Math.round(ms/86400000); }
function formatFa(d){ return d.toLocaleDateString(currentLangMeta().locale, { weekday:"long", year:"numeric", month:"long", day:"numeric" }); }
function formatFaShort(d){ return d.toLocaleDateString(currentLangMeta().locale, { month:"short", day:"numeric" }); }
function expNeeded(level){ return 100 + (level-1)*15; }
function rankForLevel(level){ let r="E"; for (const s of RANK_STEPS) if (level>=s.min) r=s.label; return r; }
function rankFor(level){ let r=RANK_STEPS[0]; for (const s of RANK_STEPS) if (level>=s.min) r=s; return r; }
function guessCategory(name){
  if (/ورزش|تمرین|دو[یز]?ی|پیاده‌?روی|بدنسازی|زور/i.test(name)) return "STR";
  if (/مطالعه|درس|کتاب|زبان|یادگیری|تمرکز|فیزیک|شیمی|ریاضی/i.test(name)) return "INT";
  if (/خواب|بیدار|آب|تغذیه|استراحت|مدیتیشن|نفس/i.test(name)) return "VIT";
  return "DISC";
}
function orderTasks(tasks){
  const wake = tasks.filter(t => WAKE_REGEX.test(t.name));
  const rest1 = tasks.filter(t => !wake.includes(t));
  const timed = rest1.filter(t => t.clockTime).sort((a,b)=> a.clockTime.localeCompare(b.clockTime));
  const untimed = rest1.filter(t => !t.clockTime);
  return [...wake, ...timed, ...untimed];
}

// ---------- CORE HELPERS ----------
function isTaskDoneSingle(ap, dateStr, taskId){
  const dayLog = ap.log[dateStr] || {};
  if (ap.penalty && ap.penalty.dateKey===dateStr && ap.penalty.taskId===taskId){
    return (dayLog[taskId]||0) >= ap.penalty.target;
  }
  return !!dayLog[taskId];
}
function dayCompletion(ap, dateStr){
  const total = ap.tasks.length;
  if (ap.skipDays && ap.skipDays.includes(dateStr)){
    return { done: total, total, skipped: true };
  }
  let done = 0;
  ap.tasks.forEach(t => { if (isTaskDoneSingle(ap, dateStr, t.id)) done++; });
  return { done, total };
}
function currentStreak(ap){
  const startD = parseKey(ap.startDateKey);
  let idx = Math.min(daysBetween(startD, new Date()), ap.planLengthDays-1);
  let streak = 0;
  while (idx >= 0){
    const k = dateKey(addDays(startD, idx));
    const { done, total } = dayCompletion(ap, k);
    if (total>0 && done===total){ streak++; idx--; } else break;
  }
  return streak;
}
function bestStreakInProgram(ap){
  const startD = parseKey(ap.startDateKey);
  const lastIndex = Math.min(daysBetween(startD, new Date()), ap.planLengthDays-1);
  let best = 0, cur = 0;
  for (let i=0;i<=lastIndex;i++){
    const k = dateKey(addDays(startD, i));
    const { done, total } = dayCompletion(ap, k);
    if (total>0 && done===total){ cur++; best = Math.max(best, cur); } else { cur = 0; }
  }
  return best;
}
// ---------- STARS & LIVES STREAK SYSTEM ----------
// Every fully-completed day earns a star. Every 5 stars convert into 1 life.
// A life can be spent to "cover" a missed day so the streak survives instead of breaking.
// This is computed purely from the log data (deterministic), walking day-by-day from the
// program's start up to the last fully-elapsed day, plus today live if already complete.
function computeStreakSystem(ap){
  const total = ap.tasks.length;
  const startD = parseKey(ap.startDateKey);
  const today = new Date();
  const todayIdx = daysBetween(startD, today);
  const planEndIdx = ap.planLengthDays - 1;
  const finalizedEndIdx = Math.min(todayIdx - 1, planEndIdx);

  let starsEarned = 0, livesUsed = 0, streak = 0;
  let lastFinalizedDayKey = null, lastFinalizedDayStatus = null, lastFinalizedDayNewLife = false;

  for (let i=0; i<=finalizedEndIdx; i++){
    const k = dateKey(addDays(startD, i));
    const { done } = dayCompletion(ap, k);
    const complete = total>0 && done===total;
    let status;
    if (complete){
      starsEarned++;
      streak++;
      status = "complete";
      if (starsEarned % 5 === 0) lastFinalizedDayNewLife = true; else lastFinalizedDayNewLife = false;
    } else if (total > 0) {
      const livesAvail = Math.floor(starsEarned/5) - livesUsed;
      if (livesAvail > 0){
        livesUsed++;
        streak++;
        status = "life_used";
        lastFinalizedDayNewLife = false;
      } else {
        streak = 0;
        status = "broken";
        lastFinalizedDayNewLife = false;
      }
    }
    if (status){ lastFinalizedDayKey = k; lastFinalizedDayStatus = status; }
  }

  let todayIncluded = false;
  if (todayIdx <= planEndIdx){
    const k = dateKey(today);
    const { done } = dayCompletion(ap, k);
    if (total>0 && done===total){
      starsEarned++;
      streak++;
      todayIncluded = true;
    }
  }

  const lives = Math.floor(starsEarned/5) - livesUsed;
  const starsProgress = starsEarned % 5;
  return { streak, lives, starsProgress, starsEarned, livesUsed, todayIncluded, lastFinalizedDayKey, lastFinalizedDayStatus, lastFinalizedDayNewLife };
}
function checkStreakSystemNotification(){
  if (!state.activeProgram) return false;
  const ap = state.activeProgram;
  const sys = computeStreakSystem(ap);
  if (!sys.lastFinalizedDayKey) return false;
  if (ap.streakNotifiedDateKey === sys.lastFinalizedDayKey) return false;
  ap.streakNotifiedDateKey = sys.lastFinalizedDayKey;
  if (sys.lastFinalizedDayStatus === "life_used"){
    pushToast(t("life_used_toast_title"), t("life_used_toast_body"));
  } else if (sys.lastFinalizedDayStatus === "broken"){
    pushToast(t("streak_broken_toast_title"), t("streak_broken_toast_body"));
  } else if (sys.lastFinalizedDayStatus === "complete" && sys.lastFinalizedDayNewLife){
    pushToast(t("life_gained_toast_title"), t("life_gained_toast_body"));
  }
  return true;
}

function computeAchievementProgress(){
  const p = state.profile;
  const ap = state.activeProgram;
  const totalTasksDone = Object.values(p.stats||{}).reduce((a,b)=>a+b,0);
  const bestStreak = ap ? bestStreakInProgram(ap) : 0;
  return { totalTasksDone, bestStreak, level: p.level, programsDone: p.completedPrograms.length };
}
function awardExp(gain){
  if (!gain) return;
  const beforeLevel = state.profile.level;
  state.profile.exp += gain;
  while (state.profile.exp >= expNeeded(state.profile.level)){
    state.profile.exp -= expNeeded(state.profile.level);
    state.profile.level += 1;
  }
  if (state.profile.level > beforeLevel) pendingLevelUp = { level: state.profile.level, rank: rankFor(state.profile.level) };
}
function ensureDailyQuest(ap){
  const todayKey = dateKey(new Date());
  if (!ap.dailyQuest || ap.dailyQuest.dateKey !== todayKey){
    const category = weakestStatCategory();
    const quests = getSideQuests(category);
    const text = quests[Math.floor(Math.random()*quests.length)];
    ap.dailyQuest = { dateKey: todayKey, text, exp: 15, done:false, category };
    return true;
  }
  return false;
}
function ensurePenaltyCheck(ap){
  const todayKey = dateKey(new Date());
  if (ap.lastPenaltyCheckDateKey === todayKey) return false;
  ap.lastPenaltyCheckDateKey = todayKey;
  const startD = parseKey(ap.startDateKey);
  const yesterdayIdx = daysBetween(startD, new Date()) - 1;
  if (yesterdayIdx >= 0 && yesterdayIdx < ap.planLengthDays){
    const yKey = dateKey(addDays(startD, yesterdayIdx));
    const { done, total } = dayCompletion(ap, yKey);
    if (total>0 && done/total < 0.4){
      const yLog = ap.log[yKey] || {};
      const candidates = ap.tasks.filter(t => !WAKE_REGEX.test(t.name) && !yLog[t.id]);
      if (candidates.length){
        const pick = candidates[Math.floor(Math.random()*candidates.length)];
        ap.penalty = { dateKey: todayKey, taskId: pick.id, target: 2 };
      }
    }
  }
  return true;
}

function processProgress(){
  if (!state.activeProgram) return;
  const ap = state.activeProgram;
  const startD = parseKey(ap.startDateKey);
  const today = new Date();
  const dayIndex = daysBetween(startD, today);
  const total = ap.tasks.length;
  const totalWeeks = Math.ceil(ap.planLengthDays/7);
  ap.processedWeeks = ap.processedWeeks || [];
  let changed = false;

  for (let w=0; w<totalWeeks; w++){
    if (ap.processedWeeks.includes(w)) continue;
    const wStart = w*7;
    const wLen = Math.min(7, ap.planLengthDays - wStart);
    const weekEndIdx = wStart + wLen - 1;
    if (dayIndex <= weekEndIdx) break; // this week (and later ones) hasn't fully passed yet
    let wDone = 0;
    for (let i=0;i<wLen;i++){
      wDone += dayCompletion(ap, dateKey(addDays(startD, wStart+i))).done;
    }
    const wPossible = total*wLen;
    const ratio = wPossible ? wDone/wPossible : 0;
    awardExp(Math.round(ratio*40));
    ap.processedWeeks.push(w);
    changed = true;
  }

  if (dayIndex < ap.planLengthDays){
    if (ensureDailyQuest(ap)) changed = true;
    if (ensurePenaltyCheck(ap)) changed = true;
  }
  if (checkStreakSystemNotification()) changed = true;

  if (dayIndex >= ap.planLengthDays){
    let doneTotal=0, possibleTotal=0;
    for (let i=0;i<ap.planLengthDays;i++){
      possibleTotal += total;
      doneTotal += dayCompletion(ap, dateKey(addDays(startD,i))).done;
    }
    const pct = possibleTotal ? Math.round((doneTotal/possibleTotal)*100) : 0;
    state.profile.completedPrograms.push({
      startDateKey: ap.startDateKey,
      finishedDateKey: dateKey(today),
      planLengthDays: ap.planLengthDays,
      completionPct: pct,
      taskCount: total,
    });
    state.activeProgram = null;
    changed = true;
  }
  if (changed) saveState();
}

function checkFocusCompletion(){
  if (!state.focusSession) return;
  const endsAt = state.focusSession.startedAt + state.focusSession.durationMinutes*60000;
  if (Date.now() >= endsAt){
    const todayKey = dateKey(new Date());
    const taskName = state.focusSession.taskName;
    if (state.activeProgram){
      const dayLog = state.activeProgram.log[todayKey] || {};
      dayLog[state.focusSession.taskId] = true;
      state.activeProgram.log[todayKey] = dayLog;
    }
    state.focusSession = null;
    notifyUser(t("reminder_title"), tpl("focus_notify_done", { task: taskName }));
    saveState();
  }
}

function pomodoroDurationMs(mode){
  const p = state.pomodoro;
  const min = mode==="work" ? p.workMin : (mode==="long" ? p.longMin : p.shortMin);
  return Math.max(1, Number(min)||1) * 60000;
}
function pomodoroRemainingMs(){
  const p = state.pomodoro;
  const base = p.remainingMs != null ? p.remainingMs : pomodoroDurationMs(p.mode);
  if (p.running && p.segmentStartedAt){
    return Math.max(0, base - (Date.now() - p.segmentStartedAt));
  }
  return base;
}
function pomodoroStart(){
  const p = state.pomodoro;
  if (p.remainingMs == null) p.remainingMs = pomodoroDurationMs(p.mode);
  p.running = true;
  p.segmentStartedAt = Date.now();
  saveState(); render();
}
function pomodoroPause(){
  const p = state.pomodoro;
  p.remainingMs = pomodoroRemainingMs();
  p.running = false;
  p.segmentStartedAt = null;
  saveState(); render();
}
function pomodoroReset(){
  const p = state.pomodoro;
  p.running = false;
  p.segmentStartedAt = null;
  p.remainingMs = pomodoroDurationMs(p.mode);
  saveState(); render();
}
function pomodoroSkip(){
  pomodoroAdvance(false);
}
function pomodoroAdvance(auto){
  const p = state.pomodoro;
  const todayKey = dateKey(new Date());
  const wasWork = p.mode === "work";
  if (p.mode === "work"){
    if (p.completedDate !== todayKey){ p.completedDate = todayKey; p.completedToday = 0; }
    p.completedToday += 1;
    p.mode = (p.roundInCycle >= p.cyclesBeforeLong) ? "long" : "short";
    if (p.roundInCycle >= p.cyclesBeforeLong) p.roundInCycle = 1; else p.roundInCycle += 1;
  } else {
    p.mode = "work";
  }
  p.running = false;
  p.segmentStartedAt = null;
  p.remainingMs = pomodoroDurationMs(p.mode);
  if (auto !== false){
    notifyUser(t("reminder_title"), wasWork ? t("pomo_notify_work_done") : t("pomo_notify_break_done"));
  }
  saveState(); render();
}
function checkPomodoroCompletion(){
  const p = state.pomodoro;
  if (!p || !p.running) return;
  if (pomodoroRemainingMs() <= 0) pomodoroAdvance();
}
function pomodoroApplySettings(){
  const p = state.pomodoro;
  const workMin = Math.max(1, Number(document.getElementById("pomo-work-in").value) || p.workMin);
  const shortMin = Math.max(1, Number(document.getElementById("pomo-short-in").value) || p.shortMin);
  const longMin = Math.max(1, Number(document.getElementById("pomo-long-in").value) || p.longMin);
  const cycles = Math.max(1, Number(document.getElementById("pomo-cycles-in").value) || p.cyclesBeforeLong);
  p.workMin = workMin; p.shortMin = shortMin; p.longMin = longMin; p.cyclesBeforeLong = cycles;
  if (!p.running) p.remainingMs = pomodoroDurationMs(p.mode);
  saveState(); render();
}

function notificationsSupported(){ return "Notification" in window; }
function notificationsEnabled(){ return notificationsSupported() && Notification.permission === "granted"; }
function requestNotificationPermission(){
  if (!notificationsSupported()) { render(); return; }
  try {
    Notification.requestPermission().then((perm)=> {
      if (perm === "granted") syncPushSubscription();
      render();
    });
  } catch(e){
    // Older Safari uses callback style
    try {
      Notification.requestPermission((perm)=> {
        if (perm === "granted") syncPushSubscription();
        render();
      });
    } catch(e2){}
  }
}
function playBeep(){
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "sine"; o.frequency.value = 880;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.22, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
    o.start();
    o.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}
function pushToast(title, body){

  const p = state.profile;

function buyShopItem(kind, id){
  const catalog = kind==="theme" ? SHOP_THEMES : kind==="frame" ? SHOP_FRAMES : SHOP_ICONSETS;
  const ownedKey = kind==="theme" ? "ownedThemes" : kind==="frame" ? "ownedFrames" : "ownedIconsets";
  const item = catalog.find(x=>x.id===id);
  if (!item) return;
  const shop = ensureShopState();
  state.profile.coins = state.profile.coins || 0;
  if (shop[ownedKey].includes(id)){ equipShopItem(kind, id); return; }
  if (state.profile.coins < item.cost){ pushToast(t("shop_not_enough"), ""); return; }
  state.profile.coins -= item.cost;
  shop[ownedKey].push(id);
  equipShopItem(kind, id);
  pushToast(t("shop_bought_toast_title"), tpl("shop_bought_toast_body",{item:t(item.nameKey)}));
  saveState(); render();
}
function equipShopItem(kind, id){
  const shop = ensureShopState();
  if (kind==="theme") shop.theme = id;
  else if (kind==="frame") shop.frame = id;
  else shop.iconset = id;
  saveState(); render();
}
function hexToRgb(hex){
  const h = hex.replace("#","");
  const n = parseInt(h.length===3 ? h.split("").map(c=>c+c).join("") : h, 16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}
function applyTheme(){
  const shop = ensureShopState();
  const theme = SHOP_THEMES.find(x=>x.id===shop.theme) || SHOP_THEMES[0];
  const c1 = hexToRgb(theme.acc1), c2 = hexToRgb(theme.acc2), c3 = hexToRgb(theme.acc3);
  const root = document.documentElement.style;
  root.setProperty("--acc-1", theme.acc1);
  root.setProperty("--acc-2", theme.acc2);
  root.setProperty("--acc-3", theme.acc3);
  root.setProperty("--acc-1-45", `rgba(${c1.r},${c1.g},${c1.b},0.45)`);
  root.setProperty("--acc-1-14", `rgba(${c1.r},${c1.g},${c1.b},0.14)`);
  root.setProperty("--acc-2-22", `rgba(${c2.r},${c2.g},${c2.b},0.22)`);
  root.setProperty("--acc-2-05", `rgba(${c2.r},${c2.g},${c2.b},0.05)`);
  root.setProperty("--acc-3-70", `rgba(${c3.r},${c3.g},${c3.b},0.7)`);
}
function notifyUser(title, body){
  try {
    if (notificationsEnabled()) new Notification(title, { body });
  } catch(e) {}
  try { if (navigator.vibrate) navigator.vibrate([180,80,180]); } catch(e) {}
  playBeep();
  pushToast(title, body);
}

function getDeviceId(){
  let id = null;
  try { id = localStorage.getItem("sp_device_id"); } catch(e){}
  if (!id){
    id = "dev_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 10);
    try { localStorage.setItem("sp_device_id", id); } catch(e){}
  }
  return id;
}
function urlB64ToUint8Array(base64String){
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}
function buildPushTasksPayload(){
  if (!state.activeProgram || !Array.isArray(state.activeProgram.tasks)) return [];
  return state.activeProgram.tasks
    .filter(tk => tk.clockTime)
    .map(tk => ({ id: tk.id, name: tk.name, time: tk.clockTime }));
}
async function syncPushSubscription(){
  try {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;
    if (!notificationsSupported() || Notification.permission !== "granted") return;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub){
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    await fetch(PUSH_SERVER_URL + "/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        deviceId: getDeviceId(),
        subscription: sub.toJSON(),
        tasks: buildPushTasksPayload()
      })
    });
  } catch(e){ console.warn("Push sync failed:", e); }
}
let pushSyncTimer = null;
function schedulePushSync(){
  if (!notificationsSupported() || Notification.permission !== "granted") return;
  if (pushSyncTimer) clearTimeout(pushSyncTimer);
  pushSyncTimer = setTimeout(syncPushSubscription, 1500);
}
function checkTaskReminders(){
  if (!state.activeProgram) return;
  const todayKey = dateKey(new Date());
  if (!state.reminders || state.reminders.dateKey !== todayKey){
    state.reminders = { dateKey: todayKey, notified: [] };
  }
  const now = new Date();
  const nowMinutes = now.getHours()*60 + now.getMinutes();
  let changed = false;
  state.activeProgram.tasks.forEach(task => {
    if (!task.clockTime) return;
    if (state.reminders.notified.includes(task.id)) return;
    if (isTaskDoneSingle(state.activeProgram, todayKey, task.id)) return;
    const parts = task.clockTime.split(":").map(Number);
    const taskMinutes = (parts[0]||0)*60 + (parts[1]||0);
    if (nowMinutes >= taskMinutes){
      state.reminders.notified.push(task.id);
      notifyUser(t("reminder_title"), tpl("reminder_body", { task: task.name, time: task.clockTime }));
      changed = true;
    }
  });
  if (changed) saveState();
}

function upsertWeightHistory(weightVal){
  const w = parseFloat(weightVal);
  if (!w || w<=0) return;
  const k = dateKey(new Date());
  const hist = state.profile.weightHistory;
  const existing = hist.find(e => e.dateKey === k);
  if (existing) existing.weight = w;
  else hist.push({ dateKey: k, weight: w });
  hist.sort((a,b)=> a.dateKey < b.dateKey ? -1 : a.dateKey > b.dateKey ? 1 : 0);
}

function toggleTodayTask(taskId){
  if (!state.activeProgram) return;
  const ap = state.activeProgram;
  const todayKey = dateKey(new Date());
  const task = ap.tasks.find(t => t.id === taskId);
  if (!task) return;
  const beforeDone = isTaskDoneSingle(ap, todayKey, taskId);
  const dayLog = ap.log[todayKey] || {};
  if (ap.penalty && ap.penalty.dateKey===todayKey && ap.penalty.taskId===taskId){
    const cur = dayLog[taskId] || 0;
    dayLog[taskId] = (cur+1) > ap.penalty.target ? 0 : cur+1;
  } else {
    dayLog[taskId] = !dayLog[taskId];
  }
  ap.log[todayKey] = dayLog;
  const afterDone = isTaskDoneSingle(ap, todayKey, taskId);
  if (task.category){
    state.profile.stats = state.profile.stats || {STR:0,INT:0,VIT:0,DISC:0};
    if (afterDone && !beforeDone) state.profile.stats[task.category] = (state.profile.stats[task.category]||0)+1;
    if (!afterDone && beforeDone) state.profile.stats[task.category] = Math.max(0,(state.profile.stats[task.category]||0)-1);
  }
  state.profile.coins = state.profile.coins || 0;
  if (afterDone && !beforeDone) state.profile.coins += 2;
  if (!afterDone && beforeDone) state.profile.coins = Math.max(0, state.profile.coins - 2);
  const { done: nowDone, total: nowTotal } = dayCompletion(ap, todayKey);
  ap.dayCoinBonusGiven = ap.dayCoinBonusGiven || {};
  if (nowTotal>0 && nowDone===nowTotal && !ap.dayCoinBonusGiven[todayKey]){
    ap.dayCoinBonusGiven[todayKey] = true;
    state.profile.coins += 10;
  } else if (!(nowTotal>0 && nowDone===nowTotal) && ap.dayCoinBonusGiven[todayKey]){
    ap.dayCoinBonusGiven[todayKey] = false;
    state.profile.coins = Math.max(0, state.profile.coins - 10);
  }
  saveState(); render();
}

  };

function handleAvatarFile(ev){
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = "";
  if (!file) return;
  if (!file.type || !file.type.startsWith("image/")){ alert(t("avatar_invalid_alert")); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const SIZE = 240;
      const canvas = document.createElement("canvas");
      canvas.width = SIZE; canvas.height = SIZE;
      const ctx = canvas.getContext("2d");
      const scale = Math.max(SIZE/img.width, SIZE/img.height);
      const sw = SIZE/scale, sh = SIZE/scale;
      const sx = (img.width - sw)/2, sy = (img.height - sh)/2;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, SIZE, SIZE);
      try{
        state.profile.avatar = canvas.toDataURL("image/jpeg", 0.85);
        saveState(); render();
      }catch(e){ alert(t("avatar_invalid_alert")); }
    };
    img.onerror = () => alert(t("avatar_invalid_alert"));
    img.src = reader.result;
  };
  reader.onerror = () => alert(t("avatar_invalid_alert"));
  reader.readAsDataURL(file);
}

function computeBmi(p){
  const h = parseFloat(p.height), w = parseFloat(p.weight);
  if (!h || !w || h<=0 || w<=0) return null;
  const meters = h/100;
  const bmi = w / (meters*meters);
  let catKey, color;
  if (bmi < 18.5){ catKey = "bmi_cat_under"; color = "#60a5fa"; }
  else if (bmi < 25){ catKey = "bmi_cat_normal"; color = "#5eead4"; }
  else if (bmi < 30){ catKey = "bmi_cat_over"; color = "#facc15"; }
  else { catKey = "bmi_cat_obese"; color = "#f87171"; }
  return { bmi: Math.round(bmi*10)/10, catKey, color };
}

  const pctOnScale = Math.max(0, Math.min(100, ((info.bmi-15)/(35-15))*100));
  return panel(`

function panel(inner, extra=""){ return `<div class="panel" style="${extra}">${inner}</div>`; }

function buildRadarSvg(stats){
  const cats = ["STR","INT","VIT","DISC"];
  const cx=90, cy=90, R=65;
  const max = Math.max(30, ...cats.map(c=>stats[c]||0)) * 1.15;
  const angles = [-90, 0, 90, 180];
  function pt(i, r){ const rad = angles[i]*Math.PI/180; return { x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad) }; }
  const poly = (r) => angles.map((_,i)=>{ const p=pt(i,r); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(" ");
  const dataPoly = angles.map((_,i)=>{
    const val = stats[cats[i]]||0;
    const r = Math.min(R, (val/max)*R);
    const p = pt(i,r);
    return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }).join(" ");
  const axisLines = angles.map((_,i)=>{ const p=pt(i,R); return `<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="rgba(96,165,250,0.35)" stroke-width="1"/>`; }).join("");
  const labels = angles.map((_,i)=>{
    const p = pt(i, R+18);
    const val = stats[cats[i]]||0;
    return `<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" fill="#8fd0ff" font-size="11" text-anchor="middle" font-family="Vazirmatn">${cats[i]} ${val}</text>`;
  }).join("");
  return `
    <svg viewBox="0 0 180 180" style="width:100%;max-width:260px;display:block;margin:0 auto;">
      <polygon points="${poly(R)}" fill="none" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
      <polygon points="${poly(R*0.5)}" fill="none" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>
      ${axisLines}
      <polygon points="${dataPoly}" fill="rgba(59,130,246,0.35)" stroke="#4da3ff" stroke-width="2"/>
      ${labels}
    </svg>
  `;
}
function buildHeatmap(ap){
  const startD = parseKey(ap.startDateKey);
  const dayIndex = daysBetween(startD, new Date());
  const totalDays = ap.planLengthDays;
  const startWeekday = startD.getDay(); // 0=Sun..6=Sat
  const totalCols = Math.ceil((startWeekday + totalDays) / 7);

  let lastMonth = null;
  const monthLabels = [];
  for (let col=0; col<totalCols; col++){
    let labelDate = null;
    for (let row=0; row<7; row++){
      const di = col*7 + row - startWeekday;
      if (di>=0 && di<totalDays){ labelDate = addDays(startD, di); break; }
    }
    let label = "";
    if (labelDate){
      const m = labelDate.getMonth();
      if (m !== lastMonth){ label = labelDate.toLocaleDateString(currentLangMeta().locale, { month:"short" }); lastMonth = m; }
    }
    monthLabels.push(label);
  }

  let cells = "";
  for (let col=0; col<totalCols; col++){
    for (let row=0; row<7; row++){
      const di = col*7 + row - startWeekday;
      if (di < 0 || di >= totalDays){
        cells += `<div class="heatcell empty"></div>`;
        continue;
      }
      const d = addDays(startD, di);
      const k = dateKey(d);
      const isToday = di === dayIndex;
      const isSkip = !!(ap.skipDays && ap.skipDays.includes(k));
      if (di > dayIndex){
        cells += `<div class="heatcell future ${isToday?'today':''}" title="${formatFaShort(d)}"></div>`;
      } else if (isSkip){
        cells += `<div class="heatcell skip ${isToday?'today':''}" onclick="showHeatDayInfo('${k}')" title="${formatFaShort(d)}"></div>`;
      } else {
        const { done, total } = dayCompletion(ap, k);
        const pct = total ? done/total : 0;
        const level = pct<=0 ? 0 : pct<0.34 ? 1 : pct<0.67 ? 2 : pct<1 ? 3 : 4;
        cells += `<div class="heatcell l${level} ${isToday?'today':''}" onclick="showHeatDayInfo('${k}')" title="${formatFaShort(d)} — ${Math.round(pct*100)}%"></div>`;
      }
    }
  }

  const monthRow = `<div class="heatmap-months">${monthLabels.map(l=>`<span>${l}</span>`).join("")}</div>`;
  const legend = `
    <div class="heatmap-legend">
      <span>${t("heatmap_less")}</span>
      <span class="heatcell l0"></span><span class="heatcell l1"></span><span class="heatcell l2"></span><span class="heatcell l3"></span><span class="heatcell l4"></span>
      <span>${t("heatmap_more")}</span>
      <span class="heatcell skip"></span><span>${t("skip_day_title").replace(/^📌\s*/,'')}</span>
    </div>`;

  let completedDays = 0;
  const lastIdx = Math.min(dayIndex, totalDays-1);
  for (let i=0; i<=lastIdx; i++){
    const k = dateKey(addDays(startD, i));
    if (ap.skipDays && ap.skipDays.includes(k)) continue;
    const { done, total } = dayCompletion(ap, k);
    if (total>0 && done===total) completedDays++;
  }
  const todayKeyStr = dateKey(new Date());
  const skippedSoFar = (ap.skipDays||[]).filter(k=>k<=todayKeyStr).length;
  const best = bestStreakInProgram(ap);
  const summary = `<p class="task-meta" style="margin-top:.5rem;">${tpl("heatmap_summary",{done:completedDays, skip:skippedSoFar, best})}</p>`;

  return `<div class="heatmap-scroll">${monthRow}<div class="heatmap">${cells}</div></div>${legend}${summary}`;
}

    pushToast(formatFa(d), t("skip_day_title"));

  }
  const { done, total } = dayCompletion(ap, dateStr);

  pushToast(formatFa(d), `${done}/${total} · ${pct}%`);

      ${dots}

function weekdayShortLabel(idx){
  const ref = new Date(2023,0,1); // a Sunday
  const d = addDays(ref, idx);
  return d.toLocaleDateString(currentLangMeta().locale, { weekday: "short" });
}
function buildWeekdayPattern(ap){
  const startD = parseKey(ap.startDateKey);
  const today = new Date();
  const total = ap.tasks.length;
  const lastIndex = Math.min(daysBetween(startD, today), ap.planLengthDays-1);
  const sums = [0,0,0,0,0,0,0];
  const counts = [0,0,0,0,0,0,0];
  for (let i=0;i<=lastIndex;i++){
    const d = addDays(startD, i);
    const k = dateKey(d);
    const { done } = dayCompletion(ap, k);
    const pct = total ? (done/total)*100 : 0;
    const wd = d.getDay();
    sums[wd] += pct;
    counts[wd] += 1;
  }
  const avgs = sums.map((s,i)=> counts[i] ? s/counts[i] : null);
  const known = avgs.map((v,i)=>({v,i})).filter(o=>o.v!==null);
  if (known.length < 2){
    return { html: `<p class="muted">${t("no_data_label")}</p>`, summary: "" };
  }
  const bestIdx = known.reduce((a,b)=> b.v>a.v?b:a).i;
  const worstIdx = known.reduce((a,b)=> b.v<a.v?b:a).i;
  const W = 280, H = 120, padL = 6, padR = 6, padT = 10, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const n = 7;
  const gap = 6;
  const barW = (plotW - gap*(n-1)) / n;
  const bars = avgs.map((v,i)=>{
    const x = padL + i*(barW+gap);
    const val = v===null ? 0 : v;
    const bh = (val/100)*plotH;
    const y = padT + plotH - bh;
    let color = "#4da3ff";
    if (v!==null && i===bestIdx) color = "#5eead4";
    if (v!==null && i===worstIdx && bestIdx!==worstIdx) color = "#f87171";
    const label = weekdayShortLabel(i);
    const valueText = v===null ? "–" : `${Math.round(v)}%`;
    return `
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(1,bh).toFixed(1)}" rx="2" fill="${color}" opacity="${v===null?0.15:0.9}"></rect>
      <text x="${(x+barW/2).toFixed(1)}" y="${(padT+plotH+14).toFixed(1)}" fill="#6f8bb3" font-size="8" text-anchor="middle" font-family="Vazirmatn">${label}</text>
      <text x="${(x+barW/2).toFixed(1)}" y="${(y-3).toFixed(1)}" fill="#93b8e6" font-size="7" text-anchor="middle" font-family="Vazirmatn">${valueText}</text>
    `;
  }).join("");
  const svg = `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;">
      <line x1="${padL}" y1="${padT+plotH}" x2="${padL+plotW}" y2="${padT+plotH}" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
      ${bars}
    </svg>
  `;
  const summary = `
    <p class="task-meta" style="color:#5eead4;margin-top:.4rem;">${tpl("best_day_label",{day:weekdayShortLabel(bestIdx), pct:Math.round(avgs[bestIdx])})}</p>
    ${bestIdx!==worstIdx ? `<p class="task-meta" style="color:#f87171;margin:.15rem 0 0;">${tpl("worst_day_label",{day:weekdayShortLabel(worstIdx), pct:Math.round(avgs[worstIdx])})}</p>` : ""}
  `;
  return { html: svg, summary };
}

// ---------- MONTHLY REPORT ----------
function monthKeyOf(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; }
function monthLabelFromKey(key){
  const [y,m] = key.split("-").map(Number);
  return new Date(y, m-1, 1).toLocaleDateString(currentLangMeta().locale, { year:"numeric", month:"long" });
}
function daysInMonthList(year, month){
  const days = [];
  const last = new Date(year, month+1, 0).getDate();
  for (let d=1; d<=last; d++) days.push(new Date(year, month, d));
  return days;
}
function computeMonthlyReport(ap, year, month){
  if (!ap) return null;
  const total = ap.tasks.length;
  if (!total) return null;
  const startD = parseKey(ap.startDateKey);
  const programEndDate = addDays(startD, ap.planLengthDays-1);
  const today = new Date();
  const capDate = today < programEndDate ? today : programEndDate;
  const monthDays = daysInMonthList(year, month).filter(d => d>=startD && d<=capDate);
  if (!monthDays.length) return null;

  let doneTotal=0, possibleTotal=0;
  const catDone = {STR:0,INT:0,VIT:0,DISC:0};
  const catPossible = {STR:0,INT:0,VIT:0,DISC:0};
  const dailyPct = [];
  monthDays.forEach(d=>{
    const k = dateKey(d);
    const { done } = dayCompletion(ap, k);
    doneTotal += done; possibleTotal += total;
    dailyPct.push(total ? (done/total)*100 : 0);
    ap.tasks.forEach(tk=>{
      const c = tk.category || "DISC";
      catPossible[c] = (catPossible[c]||0) + 1;
      if (isTaskDoneSingle(ap, k, tk.id)) catDone[c] = (catDone[c]||0) + 1;
    });
  });
  const completionPct = possibleTotal ? Math.round((doneTotal/possibleTotal)*100) : 0;

  let bestCat = null, bestRatio = -1;
  Object.keys(catPossible).forEach(c=>{
    if (catPossible[c] > 0){
      const ratio = catDone[c]/catPossible[c];
      if (ratio > bestRatio){ bestRatio = ratio; bestCat = c; }
    }
  });

  let bestStreak=0, curStreak=0;
  monthDays.forEach(d=>{
    const k = dateKey(d);
    const { done, total: t2 } = dayCompletion(ap, k);
    if (t2>0 && done===t2){ curStreak++; bestStreak = Math.max(bestStreak, curStreak); } else curStreak = 0;
  });

  const half = Math.floor(dailyPct.length/2) || 1;
  const firstHalf = dailyPct.slice(0, half);
  const secondHalf = dailyPct.slice(half);
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  const firstAvg = Math.round(avg(firstHalf));
  const secondAvg = Math.round(avg(secondHalf.length ? secondHalf : firstHalf));

  let trendKey;
  if (dailyPct.length >= 6 && firstAvg - secondAvg >= 15) trendKey = "monthly_trend_good_start_bad_end";
  else if (dailyPct.length >= 6 && secondAvg - firstAvg >= 15) trendKey = "monthly_trend_improving";
  else if (completionPct >= 80) trendKey = "monthly_trend_excellent";
  else if (completionPct < 40) trendKey = "monthly_trend_weak";
  else trendKey = "monthly_trend_steady";

  return {
    monthKey: `${year}-${pad(month+1)}`,
    completionPct, bestCat, bestRatio: Math.round(bestRatio*100),
    bestStreak, trendKey, daysCounted: monthDays.length,
  };
}
function checkMonthlyReport(){
  const nowKey = monthKeyOf(new Date());
  if (state.lastSeenMonthKey === null){
    state.lastSeenMonthKey = nowKey;
    saveState();
    return;
  }
  if (state.lastSeenMonthKey === nowKey) return;
  // month rolled over: build a report for the month(s) we just left
  const [py, pm] = state.lastSeenMonthKey.split("-").map(Number);
  const report = state.activeProgram ? computeMonthlyReport(state.activeProgram, py, pm-1) : null;
  if (report){
    state.monthlyReports[report.monthKey] = report;
    pendingMonthlyReport = report;
    pushToast(t("monthly_report_toast_title"), tpl("monthly_report_toast_body", { month: monthLabelFromKey(report.monthKey) }));
  }
  state.lastSeenMonthKey = nowKey;
  saveState();
}

function renderWeightHistoryPanel(){

function renderStatus(){
  if (!state.activeProgram){
    return panel(`
      <div class="center">
        <p class="muted">${t("no_program_msg")}</p>
        <button class="btn btn-primary" style="width:auto;margin-top:.75rem;" onclick="setTab('programs')">${t("go_build_btn")}</button>
      </div>
    `);
  }
  const ap = state.activeProgram;
  const startD = parseKey(ap.startDateKey);
  const today = new Date();
  const dayIndex = daysBetween(startD, today);
  const ordered = orderTasks(ap.tasks);
  const total = ap.tasks.length;
  const todayKey = dateKey(today);
  const { done: doneToday } = dayCompletion(ap, todayKey);
  const streakSys = computeStreakSystem(ap);
  const streak = streakSys.streak;
  const isTodaySkipped = !!(ap.skipDays && ap.skipDays.includes(todayKey));

  const daysElapsed = Math.min(dayIndex, ap.planLengthDays-1) + 1;
  let doneSoFar = 0;
  for (let i=0;i<daysElapsed;i++) doneSoFar += dayCompletion(ap, dateKey(addDays(startD,i))).done;
  const possibleSoFar = total*daysElapsed;
  const value = possibleSoFar ? Math.round((doneSoFar/possibleSoFar)*100) : 100;
  const valueColor = value>=70 ? "#5eead4" : value>=40 ? "#facc15" : "#f87171";

  const currentWeekIndex = Math.floor(dayIndex/7);
  const weekStart = addDays(startD, currentWeekIndex*7);
  const daysElapsedInWeek = dayIndex - currentWeekIndex*7 + 1;
  let liveDone = 0;
  for (let i=0;i<daysElapsedInWeek;i++) liveDone += dayCompletion(ap, dateKey(addDays(weekStart,i))).done;
  const livePossible = total*daysElapsedInWeek;
  const livePct = livePossible ? Math.round((liveDone/livePossible)*100) : 0;

  const dq = ap.dailyQuest;
  const questPanel = dq ? panel(`
    <p class="eyebrow">${t("quest_title")}</p>
    ${dq.category ? `<p class="faint" style="margin:0 0 .3rem;">${tpl("quest_focus_label",{stat:statLabel(dq.category)})}</p>` : ""}
    <p style="margin:.3rem 0;">${esc(dq.text)}</p>
    ${dq.done
      ? `<p class="faint" style="color:#5eead4;">${tpl("quest_done_msg",{exp:dq.exp})}</p>`
      : `<button class="btn btn-outline" style="width:auto;padding:.4rem .8rem;font-size:.8rem;" onclick="completeDailyQuest()">${tpl("quest_done_btn",{exp:dq.exp})}</button>`
    }
  `) : "";

  const taskItems = ordered.map(tk=>{
    const isPenalty = ap.penalty && ap.penalty.dateKey===todayKey && ap.penalty.taskId===tk.id;
    const dayLog = ap.log[todayKey] || {};
    const checked = isTaskDoneSingle(ap, todayKey, tk.id);
    const meta = [
      tk.clockTime ? tpl("at_time",{time:tk.clockTime}) : "",
      (tk.isTimed && tk.duration>0) ? `${Math.floor(tk.duration/60)}h ${tk.duration%60}m` : "",
    ].filter(Boolean).join(" · ");
    const focusBtn = (tk.isTimed && tk.duration>0 && !checked)
      ? `<button class="btn btn-outline" style="font-size:.7rem;padding:.3rem .6rem;" onclick="openFocusPicker('${tk.id}')">${t("focus_start_btn")}</button>`
      : "";
    const chkContent = isPenalty ? `${dayLog[tk.id]||0}/${ap.penalty.target}` : (checked?'✓':'');
    return `<li>
      <button class="chk ${checked?'checked':''} ${isPenalty?'penalty':''}" onclick="toggleTodayTask('${tk.id}')">${chkContent}</button>
      <div style="flex:1;">
        <p class="task-name ${checked?'done':''}">${esc(tk.name)} ${isPenalty?`<span class="penalty-tag">${t("penalty_tag")}</span>`:''}</p>
        <p class="task-meta">${meta}</p>
      </div>
      ${focusBtn}
    </li>`;
  }).join("");

  return `
    ${renderTodayWidgetCard(false)}
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem; gap:.5rem;">
      <div><p class="eyebrow">${t("today_label")}</p><h1 class="h1">${formatFa(today)}</h1></div>
      <div style="display:flex; gap:1rem;">
        <div style="text-align:left;"><p class="eyebrow">${t("value_label")}</p><p class="lvl-num" style="font-size:1.3rem;color:${valueColor};">${value}</p></div>
        <div style="text-align:left;"><p class="eyebrow">${t("streak_label")}</p><p class="lvl-num" style="font-size:1.3rem;">🔥${streak}</p></div>
      </div>
    </div>
    ${questPanel}
    ${renderSkipDayPanel(ap)}
    ${isTodaySkipped ? panel(`<p style="margin:0;">${t("skip_day_today_notice")}</p>`) : panel(`
      <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.5rem;">
        <span>${t("today_progress_label")}</span><span style="font-family:monospace;">${doneToday}/${total}</span>
      </div>
      ${bar(total ? (doneToday/total)*100 : 0)}
    `)}
    ${renderComparePrevPanel(value)}
    ${renderStarsLivesPanel(streakSys)}
    ${isTodaySkipped ? "" : panel(`<ul class="list">${taskItems}</ul>`, "padding:0;")}
    ${panel(`
      <p class="eyebrow">${t("week_progress_label")}</p>
      <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.4rem;">
        <span>${tpl("week_word",{n:currentWeekIndex+1})}</span><span style="font-family:monospace;">${livePct}%</span>
      </div>
      ${bar(livePct)}
    `)}
    ${panel(`
      <p class="eyebrow">${t("week_trend_label")}</p>
      ${buildWeeklyTrendChart(ap)}
    `)}
    ${panel(`
      <p class="eyebrow">${t("weekday_pattern_label")}</p>
      ${(()=>{ const wp = buildWeekdayPattern(ap); return wp.html + wp.summary; })()}
    `)}
  `;
}

function renderBuilderSchedule(){
  const b = state.builder;
  const ordered = orderTasks(b.tasks);
  const timed = b.tasks.filter(t=>t.isTimed && t.duration>0);
  const untimed = b.tasks.filter(t=>!t.isTimed || t.duration===0);
  const totalMin = timed.reduce((a,t)=>a+t.duration,0) || 1;

  const orderItems = ordered.map((t,i)=>`
    <li>
      <span style="font-family:monospace;color:#6f8bb3;width:1.5rem;">${i+1}</span>
      <span style="flex:1;font-weight:700;">${esc(t.name)}</span>
      ${t.clockTime ? `<span class="faint" style="font-family:monospace;">⏱ ${t.clockTime}</span>` : ""}
      ${(t.isTimed && t.duration>0) ? `<span class="faint" style="font-family:monospace;">${Math.floor(t.duration/60)}h ${t.duration%60}m</span>` : ""}
    </li>
  `).join("");

  let pieHtml = "";
  if (timed.length){
    let acc = 0;
    const stops = timed.map((t,i)=>{
      const start = acc/totalMin*360; acc += t.duration; const end = acc/totalMin*360;
      return `${GRAYS[i%GRAYS.length]} ${start}deg ${end}deg`;
    }).join(", ");
    const legend = timed.map((t,i)=>`
      <div style="font-size:.8rem;margin-bottom:.3rem;">
        <span class="legend-dot" style="background:${GRAYS[i%GRAYS.length]};"></span>${esc(t.name)}
        <span class="faint">(${Math.floor(t.duration/60)}h ${t.duration%60}m)</span>
      </div>`).join("");
    pieHtml = panel(`
      <div class="pie-wrap">
        <div class="pie" style="background: conic-gradient(${stops});"></div>
        <div>${legend}</div>
      </div>
    `);
  }

  return `
    <p class="eyebrow">${t("step3_label")}</p>
    <h2 class="h1" style="margin-bottom:.5rem;">${t("step3_title")}</h2>
    <p class="muted" style="margin-bottom:1rem;">${tpl("start_len_msg",{start:formatFa(parseKey(b.startDateKey)),days:b.planLengthDays})}</p>
    ${panel(`<ol class="list" style="list-style:none;">${orderItems}</ol>`, "padding:0;")}
    ${pieHtml}
    ${untimed.length ? `<p class="faint" style="margin-bottom:1rem;">${t("untimed_label")}: ${untimed.map(tk=>esc(tk.name)).join("، ")}</p>` : ""}
    <button class="btn btn-primary" style="margin-bottom:.75rem;" onclick="confirmSchedule()">${t("confirm_start_btn")}</button>
    <button class="btn-link" onclick="goBuilderPhase('duration')">${t("back_btn")}</button>
  `;
}
function renderPrograms(){
  if (!state.activeProgram){
    if (state.builder.phase==="setup") return renderBuilderSetup();
    if (state.builder.phase==="duration") return renderBuilderDuration();
    return renderBuilderSchedule();
  }
  const ap = state.activeProgram;
  const startD = parseKey(ap.startDateKey);
  const endD = addDays(startD, ap.planLengthDays-1);
  const dayIndex = daysBetween(startD, new Date());
  const daysLeft = Math.max(0, ap.planLengthDays - dayIndex - 1);
  const taskItems = orderTasks(ap.tasks).map(tk=>`<li><span style="font-size:.9rem;">${esc(tk.name)}</span><span class="faint" style="margin-right:auto;">${statLabel(tk.category)||''}</span></li>`).join("");
  const history = state.profile.completedPrograms.slice().reverse().map(p=>panel(`
    <div style="display:flex;justify-content:space-between;font-size:.85rem;">
      <span>${formatFa(parseKey(p.startDateKey))} ${t("to_word")} ${formatFa(parseKey(p.finishedDateKey))}</span>
      <span style="font-family:monospace;color:#8fd0ff;">${p.completionPct}%</span>

  return `
    <p class="eyebrow">${t("active_program_label")}</p>
    ${panel(`
      <p style="font-size:.9rem;margin:0 0 .3rem;">${t("start_word")} <span style="font-family:monospace;">${formatFa(startD)}</span></p>
      <p style="font-size:.9rem;margin:0 0 .3rem;">${t("end_word")} <span style="font-family:monospace;">${formatFa(endD)}</span></p>
      <p style="font-size:.9rem;margin:0;">${t("days_left_word")} <span style="font-family:monospace;color:#8fd0ff;">${daysLeft}</span></p>

    ${state.profile.completedPrograms.length ? `<p class="eyebrow">${t("completed_programs_header")}</p>${history}` : ""}
  `;
}

function renderPomodoro(){
  const p = state.pomodoro;
  const totalMs = pomodoroDurationMs(p.mode);
  const remainingMs = pomodoroRemainingMs();
  const mm = Math.floor(remainingMs/60000), ss = Math.floor((remainingMs%60000)/1000);
  const frac = totalMs>0 ? Math.max(0, Math.min(1, remainingMs/totalMs)) : 0;
  const r = 100, circ = 2*Math.PI*r;
  const dashoffset = circ * (1-frac);
  const modeColor = p.mode==="work" ? "#4da3ff" : (p.mode==="long" ? "#a78bfa" : "#4ade80");
  const todayKey = dateKey(new Date());
  const completedToday = p.completedDate===todayKey ? p.completedToday : 0;
  const showResume = p.remainingMs != null && p.remainingMs < totalMs;

  return `
    ${panel(`
      <p class="eyebrow">⏱ ${t("tab_pomodoro")}</p>
      <p class="h1" style="margin-bottom:.3rem;">${t("pomo_title")}</p>
      <p class="muted" style="margin-bottom:1rem;">${t("pomo_desc")}</p>

      <div class="pomo-modes">
        <div class="pomo-mode-pill ${p.mode==='work'?'active':''}">${t("pomo_mode_work")}</div>
        <div class="pomo-mode-pill ${p.mode==='short'?'active':''}">${t("pomo_mode_short")}</div>
        <div class="pomo-mode-pill ${p.mode==='long'?'active':''}">${t("pomo_mode_long")}</div>
      </div>

      <div class="pomo-ring-wrap">
        <div class="pomo-ring">
          <svg viewBox="0 0 220 220">
            <circle cx="110" cy="110" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10"/>
            <circle cx="110" cy="110" r="${r}" fill="none" stroke="${modeColor}" stroke-width="10" stroke-linecap="round"
              stroke-dasharray="${circ}" stroke-dashoffset="${dashoffset}" style="transition: stroke-dashoffset 1s linear; filter: drop-shadow(0 0 6px ${modeColor}99);"/>
          </svg>
          <div class="pomo-ring-time">
            <div class="timer-display" style="font-size:2.6rem;">${pad(mm)}:${pad(ss)}</div>
          </div>
        </div>
      </div>

      <p class="muted center" style="margin-bottom:1rem;">${tpl("pomo_round_label",{n:p.roundInCycle, total:p.cyclesBeforeLong})}</p>

      <div class="pomo-btn-row">
        ${p.running
          ? `<button class="btn btn-outline" style="flex:1;" onclick="pomodoroPause()">${t("pomo_pause_btn")}</button>`
          : `<button class="btn btn-primary" style="flex:1;" onclick="pomodoroStart()">${showResume ? t("pomo_resume_btn") : t("pomo_start_btn")}</button>`
        }
        <button class="btn btn-outline" style="flex:1;" onclick="pomodoroSkip()">${t("pomo_skip_btn")}</button>
      </div>
      <button class="btn-link" onclick="pomodoroReset()">${t("pomo_reset_btn")}</button>

      <p class="faint" style="margin-top:1rem;">${tpl("pomo_today_count_label",{n:completedToday})}</p>
    `)}

    ${panel(`
      <p class="eyebrow">${t("pomo_settings_title")}</p>
      <div class="pomo-settings-grid" style="margin-top:.75rem;">
        <label>
          <p class="pomo-field-label">${t("pomo_work_label")}</p>
          <input id="pomo-work-in" type="number" min="1" value="${p.workMin}">
        </label>
        <label>
          <p class="pomo-field-label">${t("pomo_short_label")}</p>
          <input id="pomo-short-in" type="number" min="1" value="${p.shortMin}">
        </label>
        <label>

        </label>

    `)}

          <div class="panel" style="margin-bottom:1rem;">
            <p class="eyebrow" style="margin-bottom:.3rem;">${t("telegram_id_label")}</p>
            <p class="lvl-num" style="font-size:1.4rem;">@Ghost_Number1</p>
          </div>
        </a>
        <div class="row">
          <button class="btn btn-primary" style="flex:1;" onclick="window.open('https://t.me/Ghost_Number1','_blank')">${t("open_telegram_btn")}</button>
          <button class="btn btn-outline" style="flex:1;" onclick="copyTelegramId()">${t("copy_id_btn")}</button>
        </div>
      </div>
    `)}
  `;
}

function renderFocusLock(){
  const fs = state.focusSession;
  const endsAt = fs.startedAt + fs.durationMinutes*60000;
  const remaining = Math.max(0, endsAt - Date.now());
  const mm = Math.floor(remaining/60000), ss = Math.floor((remaining%60000)/1000);
  const sitesHtml = fs.blockedSites.length ? `
    <div style="text-align:right;margin-top:1.5rem;">
      <p class="eyebrow">${t("blocked_until_label")}</p>
      <ul style="font-size:.9rem;padding-right:1rem;margin:0;">
        ${fs.blockedSites.map(s=>`<li>${esc(s)}</li>`).join("")}
      </ul>
      <p class="faint" style="margin-top:.5rem;">${t("blocked_disclaimer")}</p>
    </div>` : "";
  return `
    <div style="display:flex;align-items:center;justify-content:center;min-height:70vh;">
      ${panel(`
        <div class="center">
          <p class="eyebrow">🔒 FOCUS MODE</p>
          <h1 class="h1" style="margin-bottom:.3rem;">${esc(fs.taskName)}</h1>
          <p class="muted" style="margin-bottom:1.25rem;">${t("focus_doing_msg")}</p>
          <div class="timer-display">${pad(mm)}:${pad(ss)}</div>
          ${sitesHtml}
          <button class="btn-link" style="color:#f87171;margin-top:1.5rem;" onclick="cancelFocus()">${t("focus_cancel_btn")}</button>
        </div>
      `, "padding:2rem;")}
    </div>
  `;
}

function renderFocusModal(){
  if (!ui.focusPickerTaskId || !state.activeProgram) return "";
  const task = state.activeProgram.tasks.find(t=>t.id===ui.focusPickerTaskId);
  if (!task) return "";
  return `
    <div class="modal-bg">
      <div class="modal-box">
        ${panel(`
          <p class="eyebrow">${t("focus_start_title")}</p>
          <h2 class="h1" style="margin-bottom:.75rem;">${esc(task.name)}</h2>
          <p class="faint" style="margin-bottom:.5rem;">${t("focus_sites_hint")}</p>
          <input id="blocked-sites-input" type="text" placeholder="${t("focus_sites_ph")}" style="margin-bottom:1rem;border:1px solid rgba(96,165,250,0.4);padding:.5rem;">
          <div class="row">
            <button class="btn btn-primary" onclick="confirmFocus()">${t("focus_confirm_btn")}</button>
            <button class="btn-link" onclick="closeFocusPicker()">${t("focus_close_btn")}</button>
          </div>
        `)}
      </div>
    </div>
  `;
}

function renderLevelUpModal(){
  if (!pendingLevelUp) return "";
  return `
    <div class="modal-bg">
      <div class="level-up-burst">
        <p class="eyebrow" style="justify-content:center;display:flex;">⚡ LEVEL UP</p>
        <p class="lvl-num" style="font-size:3rem;">${pendingLevelUp.level}</p>
        <div class="rank-badge" style="margin:.5rem auto; background:${pendingLevelUp.rank.color}22; border:2px solid ${pendingLevelUp.rank.color}; color:${pendingLevelUp.rank.color}; box-shadow:0 0 14px ${pendingLevelUp.rank.color}66;">${pendingLevelUp.rank.label}</div>
        <button class="btn btn-primary" style="margin-top:1rem;width:auto;padding:.6rem 1.5rem;" onclick="dismissLevelUp()">${t("levelup_continue_btn")}</button>
      </div>
    </div>
  `;
}

function render(){
  if (!ui.auth.loggedIn){
    renderAuthScreen();
    return;
  }
  processProgress();
  checkFocusCompletion();
  checkPomodoroCompletion();
  checkTaskReminders();
  checkMonthlyReport();
  checkWeeklyWeightPrompt();
  pruneToasts();
  applyDocLang();
  applyTheme();

  if (WIDGET_MODE){
    renderWidgetStandalone();
    return;
  }

  const toastRoot = document.getElementById("toast-root");
  if (toastRoot) toastRoot.innerHTML = renderToasts();
  const app = document.getElementById("app");
  const brand = document.getElementById("brand-bar");
  if (brand){
    if (state.onboarded){
      const r = rankFor(state.profile.level);
      const avatarImg = state.profile.avatar ? `<img src="${state.profile.avatar}" class="brand-avatar">` : "";
      brand.innerHTML = `${avatarImg}✦ SYSTEM WINDOW <span style="color:${r.color};margin-right:.6rem;font-size:15px;font-weight:900;text-shadow:0 0 8px ${r.color}99;">· LV ${state.profile.level} · ${r.label}</span>`;
    } else {
      brand.innerHTML = "✦ SYSTEM WINDOW";
    }
  }

  if (state.focusSession){
    app.innerHTML = renderFocusLock();
    return;
  }
  if (!state.onboarded){
    app.innerHTML = renderOnboarding();
    return;
  }
  let content = "";
  if (state.tab==="status") content = renderStatus();
  else if (state.tab==="programs") content = renderPrograms();
  else if (state.tab==="pomodoro") content = renderPomodoro();
  else if (state.tab==="profile") content = renderProfile();
  else if (state.tab==="shop") content = renderShop();
  else content = renderSupport();

  app.innerHTML = renderTabBar() + content + renderFocusModal() + renderLevelUpModal() + renderMonthlyReportModal() + renderWeightPromptModal();
}

function tick(){
  const active = document.activeElement;
  const isTyping = active && (active.tagName === "INPUT");
  if (isTyping) return;
  render();
}

// ===== PWA installability: inline manifest + generated app icon (no external files) =====
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function generateAppIconDataURL(size){
  try {
    const cvs = document.createElement("canvas");
    cvs.width = size; cvs.height = size;
    const ctx = cvs.getContext("2d");
    const g = ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0,"#10203f"); g.addColorStop(1,"#03060f");
    ctx.fillStyle = g;
    roundRectPath(ctx, 0,0,size,size,size*0.22);
    ctx.fill();
    const ring = ctx.createRadialGradient(size/2,size/2,size*0.16,size/2,size/2,size*0.52);
    ring.addColorStop(0,"rgba(77,163,255,0.55)");
    ring.addColorStop(1,"rgba(77,163,255,0)");
    ctx.fillStyle = ring;
    ctx.beginPath(); ctx.arc(size/2,size/2,size*0.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#4da3ff";
    ctx.lineWidth = Math.max(2,size*0.025);
    roundRectPath(ctx, ctx.lineWidth/2, ctx.lineWidth/2, size-ctx.lineWidth, size-ctx.lineWidth, size*0.2);
    ctx.stroke();
    ctx.fillStyle = "#c9e6ff";
    ctx.font = `900 ${Math.round(size*0.5)}px Orbitron, sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.shadowColor = "#4da3ff"; ctx.shadowBlur = size*0.1;
    ctx.fillText("S", size/2, size*0.56);
    return cvs.toDataURL("image/png");
  } catch(e){ return null; }
}
function setupPWA(){
  try {
    const icon192 = generateAppIconDataURL(192);
    const icon512 = generateAppIconDataURL(512);
    if (!icon192 || !icon512) return;
    const manifest = {
      name: "پلنر سیستمی — System Planner",
      short_name: "پلنر سیستمی",
      start_url: location.pathname + (location.search || ""),
      display: "standalone",
      orientation: "portrait",
      background_color: "#050a16",
      theme_color: "#050a16",
      icons: [
        { src: icon192, sizes:"192x192", type:"image/png", purpose:"any" },
        { src: icon512, sizes:"512x512", type:"image/png", purpose:"any" },
        { src: icon192, sizes:"192x192", type:"image/png", purpose:"maskable" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
    const manifestUrl = URL.createObjectURL(blob);
    const link = document.getElementById("app-manifest-link");
    if (link) link.setAttribute("href", manifestUrl);
    const appleIcon = document.getElementById("apple-touch-icon-link");
    if (appleIcon) appleIcon.setAttribute("href", icon192);
    const favicon = document.getElementById("app-favicon-link");
    if (favicon) favicon.setAttribute("href", icon192);
  } catch(e){ console.warn("PWA setup skipped:", e); }
}

setupPWA();
render();
if (ui.auth.loggedIn) fetchStateFromServer();
setInterval(tick, 1000);

// ===== Service Worker registration (offline + installability) =====
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").then(() => {
      if (notificationsSupported() && Notification.permission === "granted") {
        syncPushSubscription();
      }
    }).catch(err => {
      console.warn("Service worker registration failed:", err);
    });
  });
}
